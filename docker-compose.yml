version: '3.8'

services:
  endee-db:
    build:
      context: ./endee
      dockerfile: Dockerfile
    container_name: endee-vector-db
    ports:
      - "8080:8080"
    volumes:
      - endee_data:/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: endee-rag-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  endee_data:
  mongo_data: